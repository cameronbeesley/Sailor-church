{% extends 'base.html' %}

{% block title%}
    Logout
{% endblock%}

{% block content%}

<h2>Sailor Community Logout</h2>

{% if user.is_authenticated %}
    <form action="{% url 'pages:logout_page' %}" method="post">
        {% csrf_token %}
        Are you sure you would like to logout?
        <button type="submit">Log Out</button>
    </form>
{% else %}
    You are not logged in. <a href = "{% url 'login' %}">Login</a> or <a href = "{% url 'pages:signup' %}">Signup</a>
{% endif %}

{% endblock %}
