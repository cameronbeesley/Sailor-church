<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sailor Church{% endblock %}</title>
    </head>
<body>

    <nav>
        <a href="{% url 'pages:index' %}">Home</a>
        <a href="{% url 'community:index' %}">Community Feed</a>
        <a href="{% url 'connect:index' %}">Connect Groups</a>
        
        {% if user.is_authenticated %}
            <a href="{% url 'pages:logout_page' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'pages:signup' %}">Signup</a>
        {% endif %}
        
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Online Sailor Community Network</p>
    </footer>

</body>
</html>
