{% extends "base.html" %}

{% block title %}
    Connect
{% endblock %}

{% block content %}
    <h1>Connect</h1>

    {% if groups.count == 0 %}
        You are not in a group?
        <a href="{% url 'connect:join' %}">Join a Group</a>

    {% else %}
        Your Groups:
        <ol>
        {% for group in groups %}
            <li>{{ group }}</li>
        {% endfor %}
        </ol> 
    {% endif %}
    
{% endblock %}
